name: Release

# Triggered by pushing a tag matching ``v*`` (e.g. ``v0.11.0``).
# Builds the wheel + sdist, signs the artefacts with sigstore, and
# publishes to PyPI via the trusted-publisher OIDC flow — no
# long-lived API tokens.
#
# One-time setup checklist:
#   1. On PyPI, configure the trusted publisher for ``egisai`` to
#      this repository's release workflow + the ``pypi`` environment.
#   2. Create the ``pypi`` environment in GitHub repo settings with
#      required reviewers so a release can't ship without approval.
#   3. Tag the release: ``git tag v0.11.0 && git push --tags``.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read-version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Read version from tag
        id: read-version
        # Tag format ``v0.11.0`` → version ``0.11.0``.
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify pyproject version matches tag
        run: |
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG_VERSION="${{ steps.read-version.outputs.version }}"
          if [ "$PYPROJECT_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::pyproject.toml version ($PYPROJECT_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: Upload distribution artefacts
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/

  smoke-install:
    # Last line of defense before the wheel hits PyPI. Even if every
    # earlier gate is green, we MUST confirm that the wheel we just
    # built can actually be installed by a real customer in an empty
    # venv with no extras, no editable install, no dev deps. This
    # catches the failure class where the unit-test venv had every
    # dep transitively satisfied (e.g. ``click`` pulled in by some
    # dev dep) but a bare ``pip install <wheel>`` is broken because
    # of a missing runtime dep — exactly what bit us when typer 0.26
    # dropped click.
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist/

      - name: Install the just-built wheel into a fresh venv
        run: |
          python -m venv /tmp/egisai-release-smoke
          /tmp/egisai-release-smoke/bin/pip install --upgrade pip
          /tmp/egisai-release-smoke/bin/pip install dist/*.whl

      - name: Exercise the import chain a customer hits on first init()
        run: |
          /tmp/egisai-release-smoke/bin/python - <<'PY'
          import sys
          print(f"python: {sys.version.split()[0]}")

          import egisai
          print(f"egisai: {egisai.__version__}")

          import spacy
          print(f"spacy: {spacy.__version__}")
          from spacy.cli.download import download as _spacy_download  # noqa: F401

          from presidio_analyzer import AnalyzerEngine  # noqa: F401
          from presidio_analyzer.nlp_engine import NlpEngineProvider  # noqa: F401

          import click
          print(f"click: {click.__version__}")

          from egisai import init, shutdown, set_context, diagnostics  # noqa: F401
          from egisai.policy import (  # noqa: F401
              PolicyContext, PolicyDecision, PolicyRule,
              evaluate_policies, evaluate_output_policies,
          )
          from egisai.policy.pii import sanitize, scan  # noqa: F401

          print("OK — release smoke green")
          PY

  sign:
    # Sigstore-sign the wheel + sdist via OIDC. The signature
    # certificate is bound to this workflow's GitHub OIDC identity,
    # so customers can verify the wheel was built from this repo's
    # tagged commit — no private key on our side.
    #
    # Depends on ``smoke-install`` (not just ``build``) so we never
    # sign — and therefore never publish — a wheel that can't be
    # installed by a real customer. The smoke gate is the last
    # line of defense before any byte hits PyPI.
    needs: [build, smoke-install]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist/

      - uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: |
            ./dist/*.whl
            ./dist/*.tar.gz
          upload-signing-artifacts: true

  publish:
    needs: sign
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/egisai
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  attach-to-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist/

      - name: Attach artefacts to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
